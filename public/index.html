<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFL Farm Helper Hub 🌻</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <h1>🌻 SFL Farm Helper Hub</h1>
    <p class="subtitle">Find help for your farm or help others!</p>
  </header>

  <main class="container">
    <section class="post-request-section">
      <h2>Post Your Request</h2>
      <form id="requestForm" class="request-form">
        <div class="form-group">
          <label for="playerName">In-Game Name *</label>
          <input type="text" id="playerName" required placeholder="Your Sunflower Land name">
        </div>
        <div class="form-group">
          <label for="telegramUsername">Telegram Username *</label>
          <input type="text" id="telegramUsername" required placeholder="@yourusername">
        </div>
        <div class="form-group">
          <label for="details">Details (Optional)</label>
          <textarea id="details" placeholder="What help do you need on your farm?"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Post Request</button>
      </form>
    </section>

    <section class="requests-section">
      <h2>Active Help Requests</h2>
      <div id="requestsList" class="requests-list">
        <div class="loading">Loading requests...</div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>SFL Farm Helper Hub - Helping farmers connect 🚜</p>
  </footer>

  <script>
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
  </script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
